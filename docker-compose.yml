version: '3.8'

services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-docs
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      - JWT_HEADER=Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      # Custom plugin for proofreading integration
      - ./onlyoffice-plugin/paralegal:/var/www/onlyoffice/documentserver/sdkjs-plugins/paralegal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paralegal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ONLYOFFICE_URL=http://onlyoffice
      - BACKEND_URL=http://backend:8000
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      # MongoDB Atlas connection string - replace with your own
      # Get it from: MongoDB Atlas -> Database -> Connect -> Drivers -> Connection String
      - MONGODB_URI=${MONGODB_URI}
      - DATABASE_NAME=paralegal
      # Gemini API key for LLM-based spellcheck
      # Get it from: https://aistudio.google.com/apikey
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - onlyoffice
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paralegal-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ONLYOFFICE_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  onlyoffice_data:
  onlyoffice_logs:
