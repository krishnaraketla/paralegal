version: '3.8'

services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-docs
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      - JWT_HEADER=Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - ./onlyoffice-plugin/paralegal:/var/www/onlyoffice/documentserver/sdkjs-plugins/paralegal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paralegal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ONLYOFFICE_URL=http://onlyoffice
      - BACKEND_URL=http://backend:8000
      - ONLYOFFICE_JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - DATABASE_NAME=${DATABASE_NAME:-paralegal}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - onlyoffice
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: paralegal-agent
    ports:
      - "8001:8001"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - AGENT_PORT=8001
      - MONGODB_URI=${MONGODB_URI}
      - DATABASE_NAME=${DATABASE_NAME:-paralegal}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paralegal-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ONLYOFFICE_URL=http://localhost:8080
      - VITE_AGENT_URL=http://localhost:8001
    depends_on:
      - backend
      - agent
    restart: unless-stopped

volumes:
  onlyoffice_data:
  onlyoffice_logs:
