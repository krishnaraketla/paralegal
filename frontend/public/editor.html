<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #editor-container {
      width: 100%;
      height: 100%;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="editor-container">
    <div class="loading">Loading editor...</div>
  </div>

  <script>
    // Plugin GUID - must match config.json
    const PARALEGAL_PLUGIN_GUID = 'asc.{7C5D5E6A-4F3B-4E2D-9A1B-8C7D6E5F4A3B}';
    
    // Wait for config from parent window
    let editorInstance = null;
    let connector = null;
    let pluginReady = false;
    
    window.addEventListener('message', function(event) {
      // Verify origin for security (in production, check specific origin)
      const data = event.data;
      
      if (data.type === 'INIT_EDITOR') {
        console.log('[IFRAME] Received INIT_EDITOR message', data);
        initEditor(data.config, data.documentServerUrl, data.editorId);
      }
      
      if (data.type === 'DESTROY_EDITOR') {
        console.log('[IFRAME] Received DESTROY_EDITOR message');
        destroyEditor();
      }
      
      if (data.type === 'APPLY_ISSUE') {
        console.log('[IFRAME] Received APPLY_ISSUE message', data.issue);
        applyIssue(data.issue);
      }
      
      if (data.type === 'SEARCH_AND_SELECT') {
        console.log('[IFRAME] Received SEARCH_AND_SELECT message', data.text);
        searchAndSelect(data.text);
      }
    });

    function initEditor(config, documentServerUrl, editorId) {
      // Load ONLYOFFICE API script
      const script = document.createElement('script');
      script.src = documentServerUrl + '/web-apps/apps/api/documents/api.js';
      script.onload = function() {
        console.log('[IFRAME] ONLYOFFICE API loaded, creating editor');
        
        // Clear loading message
        document.getElementById('editor-container').innerHTML = '';
        
        // Create the editor with plugin enabled
        editorInstance = new DocsAPI.DocEditor('editor-container', {
          ...config,
          events: {
            onAppReady: function() {
              console.log('[IFRAME] Editor app ready');
              window.parent.postMessage({ type: 'EDITOR_APP_READY' }, '*');
              
              // Try to create Automation API connector (for Developer edition)
              try {
                if (typeof editorInstance.createConnector === 'function') {
                  connector = editorInstance.createConnector();
                  console.log('[IFRAME] Automation API connector created');
                  window.parent.postMessage({ type: 'CONNECTOR_READY' }, '*');
                } else {
                  console.log('[IFRAME] Automation API not available (using plugin instead)');
                  window.parent.postMessage({ 
                    type: 'CONNECTOR_UNAVAILABLE',
                    reason: 'Using plugin for document interaction'
                  }, '*');
                }
              } catch (e) {
                console.warn('[IFRAME] Connector not available, using plugin:', e.message);
              }
              
              // Mark plugin as ready after a short delay to ensure it's loaded
              setTimeout(function() {
                pluginReady = true;
                console.log('[IFRAME] Plugin messaging ready');
                window.parent.postMessage({ type: 'PLUGIN_READY' }, '*');
              }, 1000);
            },
            onDocumentReady: function() {
              console.log('[IFRAME] Document ready');
              window.parent.postMessage({ type: 'EDITOR_DOCUMENT_READY' }, '*');
            },
            onError: function(event) {
              console.error('[IFRAME] Editor error', event);
              window.parent.postMessage({ type: 'EDITOR_ERROR', error: event }, '*');
            }
          }
        });
      };
      script.onerror = function() {
        console.error('[IFRAME] Failed to load ONLYOFFICE API');
        window.parent.postMessage({ type: 'EDITOR_ERROR', error: 'Failed to load ONLYOFFICE API' }, '*');
      };
      document.head.appendChild(script);
    }

    function destroyEditor() {
      connector = null;
      pluginReady = false;
      if (editorInstance && typeof editorInstance.destroyEditor === 'function') {
        try {
          editorInstance.destroyEditor();
        } catch (e) {
          console.warn('[IFRAME] Error destroying editor:', e);
        }
      }
      editorInstance = null;
    }
    
    /**
     * Search for text and select it in the document.
     * Broadcasts via postMessage to reach the plugin across iframe boundaries.
     * @param {string} text - Text to search for
     */
    function searchAndSelect(text) {
      if (!text) {
        console.warn('[IFRAME] No text provided for search');
        return;
      }
      
      console.log('[IFRAME] Broadcasting search via postMessage:', text);
      
      var msg = { type: 'PARALEGAL_SEARCH', text: text, timestamp: Date.now() };
      
      // Recursively post to all reachable frames
      function postToAllFrames(win, depth) {
        if (depth > 10) return; // Prevent infinite recursion
        
        try {
          // Post to this window
          win.postMessage(msg, '*');
        } catch(e) {
          console.log('[IFRAME] Could not post to window at depth ' + depth + ':', e.message);
        }
        
        // Try to access child frames
        try {
          for (var i = 0; i < win.frames.length; i++) {
            postToAllFrames(win.frames[i], depth + 1);
          }
        } catch(e) {
          // Cross-origin - can't access frames array, but try direct iframe elements
        }
      }
      
      // Start from this window and go down
      postToAllFrames(window, 0);
      
      // Also post to all iframe elements directly (in case frames array is restricted)
      var iframes = document.getElementsByTagName('iframe');
      for (var i = 0; i < iframes.length; i++) {
        try {
          iframes[i].contentWindow.postMessage(msg, '*');
          console.log('[IFRAME] Posted to child iframe', i);
        } catch(e) {
          console.log('[IFRAME] Could not post to iframe ' + i + ':', e.message);
        }
      }
      
      // Also keep window property as backup for same-origin scenarios
      window.paralegalSearchCommand = {
        type: 'searchAndSelect',
        text: text,
        timestamp: Date.now()
      };
      
      window.parent.postMessage({
        type: 'SEARCH_AND_SELECT_SENT',
        text: text
      }, '*');
    }
    
    /**
     * Apply a proofreading issue to the document.
     * Broadcasts via postMessage to reach the plugin across iframe boundaries.
     * @param {Object} issue - The proofreading issue
     */
    function applyIssue(issue) {
      if (!issue || !issue.find) {
        console.warn('[IFRAME] Invalid issue provided for apply');
        window.parent.postMessage({ 
          type: 'APPLY_ISSUE_RESULT',
          success: false,
          error: 'Invalid issue - missing find text'
        }, '*');
        return;
      }
      
      console.log('[IFRAME] Broadcasting replace via postMessage:', issue);
      
      var msg = { 
        type: 'PARALEGAL_REPLACE', 
        find: issue.find,
        replace: issue.replace || '',
        issueId: issue.id,
        timestamp: Date.now() 
      };
      
      // Recursively post to all reachable frames (same pattern as searchAndSelect)
      function postToAllFrames(win, depth) {
        if (depth > 10) return; // Prevent infinite recursion
        
        try {
          win.postMessage(msg, '*');
        } catch(e) {
          console.log('[IFRAME] Could not post to window at depth ' + depth + ':', e.message);
        }
        
        try {
          for (var i = 0; i < win.frames.length; i++) {
            postToAllFrames(win.frames[i], depth + 1);
          }
        } catch(e) {
          // Cross-origin - can't access frames array
        }
      }
      
      // Start from this window and go down
      postToAllFrames(window, 0);
      
      // Also post to all iframe elements directly (in case frames array is restricted)
      var iframes = document.getElementsByTagName('iframe');
      for (var i = 0; i < iframes.length; i++) {
        try {
          iframes[i].contentWindow.postMessage(msg, '*');
          console.log('[IFRAME] Posted replace to child iframe', i);
        } catch(e) {
          console.log('[IFRAME] Could not post to iframe ' + i + ':', e.message);
        }
      }
      
      window.parent.postMessage({
        type: 'APPLY_ISSUE_SENT',
        issueId: issue.id
      }, '*');
    }

    // Notify parent that iframe is ready
    window.parent.postMessage({ type: 'IFRAME_READY' }, '*');
  </script>
</body>
</html>
